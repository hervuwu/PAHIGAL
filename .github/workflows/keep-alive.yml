name: PAHIGAL Render Pinger

on:
  schedule:
    # This runs every 14 minutes
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allows you to trigger it manually if needed

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend
        run: curl -s https://pahigal-backshot.onrender.com > /dev/null